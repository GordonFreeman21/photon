# Quality presets for Photon Ray Tracer
# Targeted at GTX 1060 6GB (~4.4 TFLOPS, no RT cores)

[preset_potato]
ray_budget=1000000
shadow_resolution=0.25
reflection_resolution=0.125
gi_resolution=0.125
samples_per_pixel_shadow=1
samples_per_pixel_reflection=0
samples_per_pixel_gi=0
denoise_iterations=5
temporal_blend=0.95
enable_reflections=false
enable_gi=false
enable_volumetrics=false
enable_checkerboard=true
target_fps=30

[preset_low]
ray_budget=2000000
shadow_resolution=0.5
reflection_resolution=0.25
gi_resolution=0.25
samples_per_pixel_shadow=1
samples_per_pixel_reflection=0.25
samples_per_pixel_gi=0.25
denoise_iterations=5
temporal_blend=0.9
enable_reflections=true
enable_gi=true
enable_volumetrics=false
enable_checkerboard=true
target_fps=30

[preset_medium]
ray_budget=4000000
shadow_resolution=1.0
reflection_resolution=0.5
gi_resolution=0.5
samples_per_pixel_shadow=1
samples_per_pixel_reflection=0.5
samples_per_pixel_gi=0.5
denoise_iterations=5
temporal_blend=0.85
enable_reflections=true
enable_gi=true
enable_volumetrics=false
enable_checkerboard=true
target_fps=45

[preset_high]
ray_budget=8000000
shadow_resolution=1.0
reflection_resolution=1.0
gi_resolution=0.5
samples_per_pixel_shadow=1
samples_per_pixel_reflection=1
samples_per_pixel_gi=0.5
denoise_iterations=5
temporal_blend=0.85
enable_reflections=true
enable_gi=true
enable_volumetrics=true
enable_checkerboard=false
target_fps=60

[preset_ultra]
ray_budget=16000000
shadow_resolution=1.0
reflection_resolution=1.0
gi_resolution=1.0
samples_per_pixel_shadow=2
samples_per_pixel_reflection=1
samples_per_pixel_gi=1
denoise_iterations=5
temporal_blend=0.8
enable_reflections=true
enable_gi=true
enable_volumetrics=true
enable_checkerboard=false
target_fps=60

# VRAM Budget (GTX 1060 6GB)
[vram_budget]
gbuffer_mb=88
depth_mb=8
bvh_geometry_mb=768
textures_mb=2560
probes_mb=50
temporal_buffers_mb=160
denoise_scratch_mb=50
shadow_maps_mb=100
reserve_mb=512

# Adaptive Quality
[adaptive]
enabled=true
measure_window=10
downgrade_threshold_ms=33
upgrade_threshold_ms=25
upgrade_hold_frames=60
lock_preset=false
