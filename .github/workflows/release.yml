name: Multi-platform Build & Release

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-matrix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: photon-windows.exe
            binary: build/photon.exe
          - os: ubuntu-latest
            artifact: photon-ubuntu
            binary: build/photon
          - os: macos-latest
            artifact: photon-macos
            binary: build/photon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg.exe install glfw3:x64-windows glm:x64-windows --recurse

      - name: Setup dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew update || true && brew install cmake ninja pkg-config glfw glm || true

      - name: Setup dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libglfw3-dev libglm-dev pkg-config

      - name: Configure and build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir build
          cd build
          $toolchain = "${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake"
          cmake .. -G "Ninja" -DCMAKE_TOOLCHAIN_FILE="$toolchain" -DUSE_VULKAN=OFF
          ninja

      - name: Configure and build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja -DUSE_VULKAN=OFF
          ninja

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: photon-${{ matrix.os }}
          path: ${{ matrix.binary }}
          if-no-files-found: warn

  container-builds:
    name: Build on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora
            image: fedora:latest
            install: dnf -y install cmake make gcc gcc-c++ ninja-build glfw-devel glm-devel pkgconfig
          - distro: arch
            image: archlinux:latest
            install: pacman -Sy --noconfirm --needed base-devel cmake ninja glfw glm pkgconf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in ${{ matrix.distro }} container
        run: |
          docker run --rm -v "${{ github.workspace }}":/work -w /work ${{ matrix.image }} /bin/bash -lc "
            ${{ matrix.install }} &&
            mkdir -p build && cd build &&
            cmake .. -G Ninja -DUSE_VULKAN=OFF &&
            ninja
          " || true

      - name: Upload ${{ matrix.distro }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: photon-${{ matrix.distro }}
          path: build/photon
          if-no-files-found: warn

  create_release:
    name: Create Release
    needs: [build-matrix, container-builds]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloads

      - name: List artifacts
        run: ls -R downloads || true

      - name: Rename artifacts for release
        run: |
          mkdir -p release-assets
          [ -f downloads/photon-windows-latest/photon.exe ] && cp downloads/photon-windows-latest/photon.exe release-assets/photon-windows.exe || true
          [ -f downloads/photon-ubuntu-latest/photon ]     && cp downloads/photon-ubuntu-latest/photon     release-assets/photon-ubuntu    || true
          [ -f downloads/photon-macos-latest/photon ]      && cp downloads/photon-macos-latest/photon      release-assets/photon-macos     || true
          [ -f downloads/photon-fedora/photon ]            && cp downloads/photon-fedora/photon            release-assets/photon-fedora    || true
          [ -f downloads/photon-arch/photon ]              && cp downloads/photon-arch/photon              release-assets/photon-arch      || true
          ls -la release-assets || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automated cross-platform release.
            
            **Platforms:** Windows, Ubuntu, macOS, Fedora, Arch
            **Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

